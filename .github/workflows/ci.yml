name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Validate Docker Compose
        run: docker compose config --quiet

  docker-build:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: GHCR Login
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u vibe-code-tours --password-stdin

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api-prod
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/water-delivery-api:${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: web-prod
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/water-delivery-web:${{ github.sha }}
