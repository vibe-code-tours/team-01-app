name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Validate Docker Compose
        run: docker compose config --quiet

  docker-build:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ghcr-env

    steps:
      - uses: actions/checkout@v4

      - name: GHCR Login
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: docker login ghcr.io -u vibe-code-tours -p "$DOCKER_PASSWORD"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api-prod
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/water-delivery-api:${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: web-prod
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/water-delivery-web:${{ github.sha }}

  vercel-deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Get short SHA
        id: slug
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

      - name: Deploy to Vercel (Preview)
        if: startsWith(github.ref, 'refs/heads/feature/')
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--target=prebuilt --alias=${{ steps.slug.outputs.sha }}"
