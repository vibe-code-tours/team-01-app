name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  APP_NAME: water-delivery-system
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Validate Docker Compose
        run: docker compose config --quiet

  docker-build:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.actor == 'thatoe' || github.actor == 'wythwin' || github.actor == 'KhinSuSuChit' || github.actor == 'linletlettun' || github.actor == 'hanpainghtoo' || github.actor == 'haymannko' || github.actor == 'Wailynn351')

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: slug
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/water-delivery-web
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: web-prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Export Image URL
        run: |
          IMAGE_URL="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/water-delivery-web:${{ steps.slug.outputs.sha }}"
          echo "### 🐳 Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**${IMAGE_URL}**" >> $GITHUB_STEP_SUMMARY

  vercel-deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (github.actor == 'thatoe' || github.actor == 'wythwin' || github.actor == 'KhinSuSuChit' || github.actor == 'linletlettun' || github.actor == 'hanpainghtoo' || github.actor == 'haymannko' || github.actor == 'Wailynn351'))
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Get version tag
        id: version
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Vercel (production)
        id: deploy-prod
        if: github.ref == 'refs/heads/main'
        run: |
          vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --scope klockdevops --project water-delivery-system 2>&1 | tee /tmp/vercel-output.txt
          URL=$(grep -oP 'https://\S+\.vercel\.app' /tmp/vercel-output.txt | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to $URL"
        working-directory: apps/web

      - name: Deploy to Vercel (preview)
        id: deploy-preview
        if: github.ref != 'refs/heads/main'
        run: |
          vercel --yes --token=${{ secrets.VERCEL_TOKEN }} --scope klockdevops --project water-delivery-system 2>&1 | tee /tmp/vercel-output.txt
          URL=$(grep -oP 'https://\S+\.vercel\.app' /tmp/vercel-output.txt | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to $URL"
        working-directory: apps/web

      - name: Export deployment URL
        run: |
          if [ -n "${{ steps.deploy-prod.outputs.url }}" ]; then
            echo "url=${{ steps.deploy-prod.outputs.url }}" >> "$GITHUB_OUTPUT"
            echo "### 🚀 Deployment" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Production:** ${{ steps.deploy-prod.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "url=${{ steps.deploy-preview.outputs.url }}" >> "$GITHUB_OUTPUT"
            echo "### 🚀 Deployment" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Preview:** ${{ steps.deploy-preview.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          fi
