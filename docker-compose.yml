name: water-delivery

services:
  postgres:
    image: postgres:16-alpine
    container_name: water-delivery-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-water_delivery}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: water-delivery-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: water-delivery-api
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_NAME:-water_delivery}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-random-string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-to-a-secure-random-string-at-least-32-chars}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      API_PORT: ${API_PORT:-3001}
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-http://localhost:3005}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3006:3001"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/db/src:/app/packages/db/src
      - ./apps/api/uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: water-delivery-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3006}
      API_URL: http://api:3001
      TRUSTED_ORIGIN: http://localhost:3005
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3005:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
    depends_on:
      - api

volumes:
  pgdata:
  redisdata: